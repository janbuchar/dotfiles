[settings]
experimental = true
disable_hints = ["python_multi"]
idiomatic_version_file_enable_tools = []

[hooks]
cd = """
sync-configs-to-worktree "$MISE_ORIGINAL_CWD"
"""

[tools]
actionlint = "latest"
stylua = "latest"
"github:apify/apify-cli" = { version = "1.3.0", asset_pattern = "apify-*-linux-x64" }
usage = "latest"
uv = "latest"

[env._.python.venv]
path = ".venv"
create = true
