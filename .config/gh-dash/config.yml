# yaml-language-server: $schema=https://gh-dash.dev/schema.json
prSections:
- title: Assigned
  filters: is:open archived:false assignee:@me
- title: Needs My Review
  filters: is:open archived:false draft:false review-requested:@me
- title: Involved
  filters: is:open archived:false involves:@me -author:@me
- title: My Pull Requests
  filters: is:open archived:false author:@me
issuesSections:
- title: Assigned
  filters: is:open archived:false assignee:@me -linked:pr
- title: In progress
  filters: is:open archived:false assignee:@me linked:pr
- title: Involved
  filters: is:open archived:false involves:@me -author:@me
- title: My Issues
  filters: is:open archived:false author:@me
defaults:
  preview:
    open: true
    width: 100
  prsLimit: 20
  issuesLimit: 20
  view: prs
  layout:
    prs:
      updatedAt:
        width: 7
      repo:
        width: 15
      author:
        width: 15
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 16
    issues:
      updatedAt:
        width: 7
      repo:
        width: 15
      creator:
        width: 10
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings:
  issues:
    - key: tab
      builtin: viewPrs
  prs:
    - key: tab
      builtin: viewIssues
repoPaths: {}
theme:
  ui:
    table:
      showSeparator: true
  # Nord palette
  colors:
    text:
      primary: "#ECEFF4"
      secondary: "#D8DEE9"
      inverted: "#2E3440"
      faint: "#4C566A"
      warning: "#BF616A"
      success: "#A3BE8C"
    background:
      selected: "#3B4252"
    border:
      primary: "#81A1C1"
      secondary: "#5E81AC"
      faint: "#434C5E"
pager:
  diff: ""
confirmQuit: false
